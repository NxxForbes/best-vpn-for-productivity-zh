<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 330" width="680" height="330" font-family="system-ui,-apple-system,sans-serif">

  <!-- Background -->
  <rect width="680" height="330" fill="#FAFAFA" rx="10"/>

  <!-- Title -->
  <text x="340" y="32" text-anchor="middle" font-size="15" font-weight="700" fill="#1A202C">Speed Test Comparison (200 Mbps Baseline)</text>

  <!-- Chart area: x=150 to x=610, y=55 to y=295 -->
  <line x1="150" y1="50" x2="150" y2="295" stroke="#E2E8F0" stroke-width="1"/>

  <!-- Grid lines at 0%, 25%, 50%, 75%, 100% -->
  <line x1="265" y1="50" x2="265" y2="295" stroke="#EDF2F7" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="380" y1="50" x2="380" y2="295" stroke="#EDF2F7" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="495" y1="50" x2="495" y2="295" stroke="#EDF2F7" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="610" y1="50" x2="610" y2="295" stroke="#EDF2F7" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- X-axis labels -->
  <text x="150" y="312" text-anchor="middle" font-size="11" fill="#718096">0%</text>
  <text x="265" y="312" text-anchor="middle" font-size="11" fill="#718096">25%</text>
  <text x="380" y="312" text-anchor="middle" font-size="11" fill="#718096">50%</text>
  <text x="495" y="312" text-anchor="middle" font-size="11" fill="#718096">75%</text>
  <text x="610" y="312" text-anchor="middle" font-size="11" fill="#718096">100%</text>

  <!-- X-axis -->
  <line x1="150" y1="295" x2="625" y2="295" stroke="#CBD5E0" stroke-width="1.5"/>

  <!-- Subtitle -->
  <text x="340" y="50" text-anchor="middle" font-size="11" fill="#718096">Speed Retention / Avg Download Speed (200 Mbps baseline)</text>

  <!--
    Bar width = rate * 460
    NordVPN   90%: width=414   end=564
    StrongVPN 83%: width=381.8 end=531.8
    Surflare  78%: width=358.8 end=508.8
    ExpressVPN77%: width=354.2 end=504.2
    CyberGhost72%: width=331.2 end=481.2
  -->

  <!-- NordVPN bar -->
  <rect x="150" y="60" width="414" height="38" rx="4" fill="#4B7BE5" opacity="0.9"/>
  <text x="140" y="84" text-anchor="end" font-size="12" fill="#2D3748" font-weight="600">NordVPN</text>
  <text x="572" y="84" text-anchor="start" font-size="12" fill="#4B7BE5" font-weight="700">90% · ~180 Mbps</text>

  <!-- StrongVPN bar -->
  <rect x="150" y="106" width="381.8" height="38" rx="4" fill="#2F855A" opacity="0.9"/>
  <text x="140" y="130" text-anchor="end" font-size="12" fill="#2D3748" font-weight="600">StrongVPN</text>
  <text x="540" y="130" text-anchor="start" font-size="12" fill="#2F855A" font-weight="700">83% · ~166 Mbps</text>

  <!-- Surflare bar -->
  <rect x="150" y="152" width="358.8" height="38" rx="4" fill="#805AD5" opacity="0.9"/>
  <text x="140" y="176" text-anchor="end" font-size="12" fill="#2D3748" font-weight="600">Surflare</text>
  <text x="517" y="176" text-anchor="start" font-size="12" fill="#805AD5" font-weight="700">78% · ~156 Mbps</text>

  <!-- ExpressVPN bar -->
  <rect x="150" y="198" width="354.2" height="38" rx="4" fill="#E53E3E" opacity="0.9"/>
  <text x="140" y="222" text-anchor="end" font-size="12" fill="#2D3748" font-weight="600">ExpressVPN</text>
  <text x="512" y="222" text-anchor="start" font-size="12" fill="#E53E3E" font-weight="700">77% · ~154 Mbps</text>

  <!-- CyberGhost bar -->
  <rect x="150" y="244" width="331.2" height="38" rx="4" fill="#DD6B20" opacity="0.9"/>
  <text x="140" y="268" text-anchor="end" font-size="12" fill="#2D3748" font-weight="600">CyberGhost</text>
  <text x="489" y="268" text-anchor="start" font-size="12" fill="#DD6B20" font-weight="700">72% · ~144 Mbps</text>

  <!-- Reference line: 70% threshold — 70% = 150 + 0.7*460 = 472 -->
  <line x1="472" y1="50" x2="472" y2="295" stroke="#F6AD55" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="474" y="47" font-size="10" fill="#D69E2E" font-weight="600">70% Baseline</text>
  <text x="474" y="57" font-size="9" fill="#D69E2E">(Video call threshold)</text>

</svg>
